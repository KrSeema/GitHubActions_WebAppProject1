name: Event-Demo
on: 
  pull_request:
    types:
      - opened
  workflow_dispatch:
    
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Output event Data
        run: echo "${{ toJSON(github.event) }}"
      - name: get code
        uses: actions/checkout@v7      
      - name: Install NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: '22'      
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test
      - name: Build Code
        run: npm run build
      - name: Deploy
        run: echo "Deploying the project..."

 