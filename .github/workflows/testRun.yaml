name: Test-run
on: push
jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v7
      
      - name: Install NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: '22'      
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run lint