name: Deployment-Exercise
on: workflow_dispatch
jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v7
      
      - name: Install NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: '22'      
      - name: Install dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint
      - name: Run Tests
        run: npm run test
      - name: Build Code
        run: npm run build
      - name: Deploy
        run: echo "Deploying the project..."